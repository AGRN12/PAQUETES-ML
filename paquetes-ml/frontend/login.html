<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="style.css">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    .box-1 {
      position: absolute;
      margin-top: 100px;
      left: 350px;
      background: white;
      padding: 80px;
      border-radius: 8px;
      width: 300px;
    }
    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
  </style>
</head>
<body>
    <div id="navbar"></div>

<div class="box-1">
  <h3>Acceso a contraseñas</h3>

  <input class="input1" id="username" placeholder="Usuario" />
  <input class="input1" id="password" type="password" placeholder="Contraseña" />

  <button onclick="login()">Entrar</button>

  <p id="msg"></p>
</div>
<script>
  fetch('nav.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('navbar').innerHTML = html;

      // Marcar activo según página
      const page = document.body.dataset.page;
      document.querySelectorAll('nav a').forEach(a => {
        if (a.dataset.page === page) {
          a.classList.add('active');
        }
      });
    });
</script>
<script src="login.js"></script>
</body>
</html>
