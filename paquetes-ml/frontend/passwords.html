<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body data-page="passwords">
<div id="navbar"></div>

<div id="adminPanel" style="display:none; border:1px solid #ccc; padding:10px; margin-bottom:15px;">
  <h2>👑 Usuarios</h2>

  <table>
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>

  <h3>➕ Crear usuario</h3>
  <input id="newUser" placeholder="Usuario">
  <input id="newPass" type="password" placeholder="Contraseña">

  <select id="newRole">
    <option value="USER">USER</option>
    <option value="ADMIN">ADMIN</option>
  </select>

  <button onclick="createUser()">Crear usuario</button>
</div>
<div class="box">
  <h2>🔐 Nueva contraseña</h2>

  <input id="platform" placeholder="Plataforma (Gmail, ML, PC...)" />
  <input id="username" placeholder="Usuario / correo" />
  <input id="password" placeholder="Contraseña"  type="password" style="width: 80%;"/>
  <button onclick="togglePassword()" style="width: 10%;">👁</button>
  <textarea id="notes" placeholder="Notas"></textarea>
  <script>function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}</script>

  <button onclick="createPassword()">Guardar</button>
</div>

<div class="box">
  <h2>📋 Contraseñas</h2>

  <table>
    <thead>
      <tr>
        <th>Plataforma</th>
        <th>Usuario</th>
        <th>Contraseña</th>
        <th>Notas</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="passwordTable"></tbody>
  </table>
</div>
<button onclick="exportBackup()">📦 Exportar respaldo</button>

<input
  type="file"
  id="importFile"
  accept="application/json"
  hidden
  onchange="importBackup(event)"
>

<button onclick="document.getElementById('importFile').click()">
  📥 Importar respaldo
</button>
<script src="passwords.js"></script>
<script>
  fetch('nav.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('navbar').innerHTML = html;

      // Marcar activo según página
      const page = document.body.dataset.page;
      document.querySelectorAll('nav a').forEach(a => {
        if (a.dataset.page === page) {
          a.classList.add('active');
        }
      });
    });
</script>
<script>
  const MAX_INACTIVITY = 60 * 1000;

  function updateActivity() {
    localStorage.setItem('password_last_activity', Date.now());
  }

  function checkInactivity() {
    const last = Number(localStorage.getItem('password_last_activity'));
    if (Date.now() - last > MAX_INACTIVITY) {
      logout();
    }
  }

  function logout() {
    localStorage.clear();
    alert('Sesión cerrada por inactividad');
    window.location.href = 'login.html';
  }

  ['click','mousemove','keydown','scroll'].forEach(evt =>
    document.addEventListener(evt, updateActivity)
  );

  setInterval(checkInactivity, 5000);
</script>
</body>
</html>
